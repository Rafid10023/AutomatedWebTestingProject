name: Java CI with Maven

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AutomatedWebTestingProject

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Install Google Chrome
      uses: browser-actions/setup-chrome@v1

    - name: Install ChromeDriver
      uses: nanasess/setup-chromedriver@v2

    - name: Run Serenity Cucumber tests
      run: mvn clean verify -Dtest=CucumberRunnerTest

    - name: check for runner class
      run: mvn -X test

    - name: Generate Serenity report
      run: mvn serenity:aggregate


    - name: Upload Serenity Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: serenity-report
        path: AutomatedWebTestingProject/target
